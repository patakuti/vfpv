<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    v3a: 山1層のみ (最もシンプル)
    ドローン scale=180 px/unit, center=(256,165)
    Motors: TL(157,66) TR(355,66) BL(157,264) BR(355,264)
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4D8CFF"/>
      <stop offset="72%" stop-color="#A6D1FF"/>
      <stop offset="100%" stop-color="#C2DCFF"/>
    </linearGradient>
    <radialGradient id="prop" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9999A6" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#9999A6" stop-opacity="0.04"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
                    flood-color="#000822" flood-opacity="0.52"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Mountain (1層): mountain_color low #5C4499, 4峰 -->
  <polygon points="
    0,448  96,318  208,356  312,306  428,344  512,322  512,448
  " fill="#5C4499"/>
  <!-- Snow caps: mountain_color high #E6E6FF -->
  <polygon points="96,318  113,342   79,342" fill="#E6E6FF"/>
  <polygon points="312,306 330,332  294,332" fill="#E6E6FF"/>

  <!-- Foreground: normal_color low #0A4010 -->
  <rect x="0" y="434" width="512" height="78" fill="#0A4010"/>

  <!-- ── Drone ── -->
  <!-- Prop discs (r=40) -->
  <circle cx="157" cy="66"  r="40" fill="url(#prop)"/>
  <circle cx="355" cy="66"  r="40" fill="url(#prop)"/>
  <circle cx="157" cy="264" r="40" fill="url(#prop)"/>
  <circle cx="355" cy="264" r="40" fill="url(#prop)"/>

  <!-- Prop guard octagons (R=48, flat-top)
       34 = round(48*cos45°) -->
  <polygon points="157,18  191,32  205,66  191,100 157,114 123,100 109,66  123,32"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="355,18  389,32  403,66  389,100 355,114 321,100 307,66  321,32"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="157,216 191,230 205,264 191,298 157,312 123,298 109,264 123,230"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="355,216 389,230 403,264 389,298 355,312 321,298 307,264 321,230"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>

  <g filter="url(#shadow)">
    <!-- X-frame arms: carbon #1A1A21, width=13, square caps -->
    <line x1="157" y1="66"  x2="355" y2="264"
          stroke="#1A1A21" stroke-width="13" stroke-linecap="square"/>
    <line x1="355" y1="66"  x2="157" y2="264"
          stroke="#1A1A21" stroke-width="13" stroke-linecap="square"/>
    <!-- Reinforcement ribs: dark_metal #2E2E38 -->
    <line x1="157" y1="66"  x2="355" y2="264"
          stroke="#2E2E38" stroke-width="5"  stroke-linecap="square"/>
    <line x1="355" y1="66"  x2="157" y2="264"
          stroke="#2E2E38" stroke-width="5"  stroke-linecap="square"/>

    <!-- Main chassis: carbon #1A1A21 (80×100 px) -->
    <rect x="216" y="115" width="80" height="100" fill="#1A1A21"/>
    <!-- Bottom plate: dark_metal #2E2E38 -->
    <rect x="222" y="121" width="68" height="88"  fill="#2E2E38"/>
    <!-- Center spine -->
    <rect x="249" y="115" width="14" height="100" fill="#2E2E38"/>
    <!-- Side armor left -->
    <rect x="216" y="121" width="22" height="80"  fill="#2E2E38"/>
    <rect x="216" y="124" width="14" height="72"  fill="#1A1A21"/>
    <!-- Side armor right -->
    <rect x="274" y="121" width="22" height="80"  fill="#2E2E38"/>
    <rect x="282" y="124" width="14" height="72"  fill="#1A1A21"/>

    <!-- FC box at z=+0.06 (y=165+11=176): 18×22 px, accent_blue lines -->
    <rect x="247" y="165" width="18" height="22"  fill="#2E2E38"/>
    <rect x="246" y="165" width="20" height="3"   fill="#0099FF"/>
    <rect x="246" y="184" width="20" height="3"   fill="#0099FF"/>
    <rect x="250" y="169" width="12" height="14"  fill="#262633"/>

    <!-- ESC at z=-0.18 (y=165-32=133): 14×16 px -->
    <rect x="249" y="127" width="14" height="16"  fill="#2E2E38"/>
    <rect x="251" y="128" width="10" height="3"   fill="#0099FF"/>

    <!-- Front nose at z=-0.30 (y=165-54=111): 54×14 px -->
    <rect x="229" y="104" width="54" height="14"  fill="#1A1A21"/>

    <!-- Camera gimbal at z=-0.35 (y=165-63=102): 18×18 px -->
    <rect x="247" y="93"  width="18" height="18"  fill="#2E2E38"/>
    <rect x="250" y="96"  width="12" height="12"  fill="#080812"/>
    <rect x="253" y="99"  width="6"  height="6"   fill="#0066CC" fill-opacity="0.65"/>

    <!-- Side blue LED strips: x=213 and x=299, y=131 to 203 -->
    <rect x="212" y="131" width="4"  height="72"  fill="#0099FF" opacity="0.90"/>
    <rect x="296" y="131" width="4"  height="72"  fill="#0099FF" opacity="0.90"/>

    <!-- Receiver box at z=+0.20 (y=165+36=201): 22×14 px -->
    <rect x="245" y="198" width="22" height="14"  fill="#2E2E38"/>

    <!-- Rear red LED bar at z=+0.29 (y=165+52=217): 36×5 px -->
    <rect x="238" y="215" width="36" height="5"   fill="#FF1A1A"/>

    <!-- Antennas at z=+0.22 (y=165+40=205), x=256±14 -->
    <rect x="241" y="205" width="3"  height="27"  fill="#2E2E38"/>
    <rect x="268" y="205" width="3"  height="27"  fill="#2E2E38"/>
    <rect x="241" y="229" width="3"  height="5"   fill="#FF1A1A"/>
    <rect x="268" y="229" width="3"  height="5"   fill="#FF1A1A"/>

    <!-- Motor housings r=17 -->
    <circle cx="157" cy="66"  r="17" fill="#2E2E38"/>
    <circle cx="355" cy="66"  r="17" fill="#2E2E38"/>
    <circle cx="157" cy="264" r="17" fill="#2E2E38"/>
    <circle cx="355" cy="264" r="17" fill="#2E2E38"/>
    <!-- Motor body r=12: motor_mat #262633 -->
    <circle cx="157" cy="66"  r="12" fill="#262633"/>
    <circle cx="355" cy="66"  r="12" fill="#262633"/>
    <circle cx="157" cy="264" r="12" fill="#262633"/>
    <circle cx="355" cy="264" r="12" fill="#262633"/>
    <!-- LED rings: front=blue, rear=red -->
    <circle cx="157" cy="66"  r="14" fill="none" stroke="#0099FF" stroke-width="3.5"/>
    <circle cx="355" cy="66"  r="14" fill="none" stroke="#0099FF" stroke-width="3.5"/>
    <circle cx="157" cy="264" r="14" fill="none" stroke="#FF1A1A" stroke-width="3.5"/>
    <circle cx="355" cy="264" r="14" fill="none" stroke="#FF1A1A" stroke-width="3.5"/>
  </g>
</svg>
