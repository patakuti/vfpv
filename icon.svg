    <rect x="216" y="115" width="80" height="100" fill="#1A1A21"/>
    <rect x="222" y="121" width="68" height="88"  fill="#2E2E38"/>
    <rect x="249" y="115" width="14" height="100" fill="#2E2E38"/>
    <rect x="216" y="121" width="22" height="80"  fill="#2E2E38"/>
    <rect x="216" y="124" width="14" height="72"  fill="#1A1A21"/>
    <rect x="274" y="121" width="22" height="80"  fill="#2E2E38"/>
    <rect x="282" y="124" width="14" height="72"  fill="#1A1A21"/>

