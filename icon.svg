  <g filter="url(#shadow)">
    <line x1="157" y1="66"  x2="355" y2="264"
          stroke="#1A1A21" stroke-width="13" stroke-linecap="square"/>
    <line x1="355" y1="66"  x2="157" y2="264"
          stroke="#1A1A21" stroke-width="13" stroke-linecap="square"/>
    <line x1="157" y1="66"  x2="355" y2="264"
