<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    v3b: 山2層 紫 + 緑 (標準terrain配色)
    ドローン同一 scale=180, center=(256,165)
  -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4D8CFF"/>
      <stop offset="72%" stop-color="#A6D1FF"/>
      <stop offset="100%" stop-color="#C2DCFF"/>
    </linearGradient>
    <radialGradient id="prop" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9999A6" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#9999A6" stop-opacity="0.04"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
                    flood-color="#000822" flood-opacity="0.52"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Far mountains: #5C4499, 4峰 -->
  <polygon points="
    0,445  88,312  205,350  308,302  418,338  512,316  512,445
  " fill="#5C4499"/>
  <!-- Snow: #E6E6FF -->
  <polygon points="88,312  106,338   70,338" fill="#E6E6FF"/>
  <polygon points="308,302 328,330  288,330" fill="#E6E6FF"/>

  <!-- Near hills: normal_color lerp #1A6B24, 3峰 -->
  <polygon points="
    0,470  130,390  285,412  440,394  512,402  512,470
  " fill="#1A6B24"/>

  <!-- Foreground -->
  <rect x="0" y="460" width="512" height="52" fill="#0A4010"/>

  <!-- ── Drone (identical to v3a) ── -->
  <circle cx="157" cy="66"  r="40" fill="url(#prop)"/>
  <circle cx="355" cy="66"  r="40" fill="url(#prop)"/>
  <circle cx="157" cy="264" r="40" fill="url(#prop)"/>
  <circle cx="355" cy="264" r="40" fill="url(#prop)"/>

  <polygon points="157,18  191,32  205,66  191,100 157,114 123,100 109,66  123,32"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="355,18  389,32  403,66  389,100 355,114 321,100 307,66  321,32"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="157,216 191,230 205,264 191,298 157,312 123,298 109,264 123,230"
           fill="none" stroke="#1F1F26" stroke-width="7" stroke-linejoin="miter"/>
  <polygon points="355,216 389,230 403,264 389,298 355,312 321,298 307,264 321,230"
